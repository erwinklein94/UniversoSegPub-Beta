name: Atualizar Concursos - Motor Genérico

on:
  workflow_dispatch:
    inputs:
      instituicao:
        description: 'Qual instituição atualizar? Use uma por vez ou prioridade_1/prioridade_2 para lote.'
        required: true
        default: 'pmesp'
        type: choice
        options:
          - 'pmesp'
          - 'pcsp'
          - 'prf'
          - 'pf'
          - 'prioridade_1'
          - 'prioridade_2'
          - 'todas_configuradas'
          - 'pcdf'
          - 'bmsp'
          - 'ppsp'
          - 'pmal'
          - 'pcal'
          - 'ppal'
          - 'bmmg'
          - 'ppmg'
          - 'pmmg'
          - 'pcmg'
          - 'bmpr'
          - 'pmpr'
          - 'pcpr'
          - 'pmam'
          - 'pcam'
          - 'pmerj'
          - 'bmrj'
          - 'pcerj'
          - 'pmba'
          - 'pcba'
          - 'pmrs'
          - 'pcrs'
          - 'pmsc'
          - 'bmsc'
          - 'pcsc'
          - 'pmes'
          - 'bmes'
          - 'pces'
          - 'pmms'
          - 'bmms'
          - 'pcms'
          - 'ppms'
          - 'pmmt'
          - 'bmmt'
          - 'pcmt'
          - 'ppmt'
          - 'pmac'
          - 'pcac'
          - 'ppac'
          - 'pmap'
          - 'pcap'
          - 'bmap'
          - 'pcce'
      limite:
        description: 'Limite de instituições quando usar prioridade_1, prioridade_2 ou todas_configuradas'
        required: false
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '5'
          - '10'
          - '20'
          - '30'
          - '50'
      forcar_atualizacao:
        description: 'Forçar chamada da OpenAI mesmo sem mudança detectada?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      usar_web_search:
        description: 'Usar web_search da OpenAI? Mais caro. Deixe false no modo econômico.'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      modo_qualidade:
        description: 'economico preserva dados; qualificado usa modelo melhor e web_search mesmo quando fonte direta falhar.'
        required: false
        default: 'economico'
        type: choice
        options:
          - 'economico'
          - 'qualificado'
  schedule:
    - cron: '0 10 * * 1'

permissions:
  contents: write

jobs:
  atualizar-concursos:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Rodar motor genérico de concursos
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4-nano' }}
          OPENAI_MODEL_QUALIDADE: ${{ vars.OPENAI_MODEL_QUALIDADE || 'gpt-5.4-mini' }}
          INSTITUICAO_ID: ${{ github.event.inputs.instituicao || 'prioridade_1' }}
          LIMITE_INSTITUICOES: ${{ github.event.inputs.limite || '1' }}
          FORCAR_ATUALIZACAO: ${{ github.event.inputs.forcar_atualizacao || 'false' }}
          USAR_WEB_SEARCH: ${{ github.event.inputs.usar_web_search || 'false' }}
          MODO_QUALIDADE: ${{ github.event.inputs.modo_qualidade || 'economico' }}
          DIAS_REVALIDACAO_COMPLETA: '14'
          MAX_PAGINAS_OFICIAIS: '6'
          MAX_CARACTERES_POR_PAGINA: '4500'
          MIN_SCORE_PUBLICACAO: '78'
          MAX_CRITICOS_GENERICOS: '2'
          PERMITIR_PUBLICAR_SE_PIORA: 'false'
          PUBLICAR_RESULTADO_QUALIFICADO_COM_OPENAI: 'true'
        run: node scripts/atualizar-concursos.mjs
      - name: Gerar relatório de qualidade após atualização
        env:
          SCORE_MINIMO_QUALIFICADO: '78'
          DIAS_ALERTA_DESATUALIZADO: '30'
          DIAS_ALERTA_MUITO_DESATUALIZADO: '60'
        run: node scripts/gerar-relatorio-concursos.mjs

      - name: Salvar alterações no repositório
        run: |
          if [ -z "$(git status --porcelain data/concursos docs/RELATORIO-CONCURSOS.md relatorio-concursos.html)" ]; then
            echo "Nenhuma alteração detectada em concursos ou relatório."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/concursos docs/RELATORIO-CONCURSOS.md relatorio-concursos.html
          git commit -m "Atualiza concursos e relatório de qualidade"
          git push
